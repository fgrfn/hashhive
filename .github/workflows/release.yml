name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to use version.txt)"
        required: false
        default: ""

jobs:
  release:
    name: Build Docker image, push to GHCR & create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub Release
      packages: write    # push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(cat version.txt | tr -d '[:space:]')"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            # Pull & run (no build needed)
            docker run -d -p 8000:8000 ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ```

            Or with persistent data:
            ```bash
            docker run -d -p 8000:8000 \
              -v hashhive-data:/app/backend/data \
              ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ```

            Dashboard: **http://localhost:8000**

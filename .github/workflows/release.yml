name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - dev

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "tag=v${VERSION}"    >> $GITHUB_OUTPUT
            echo "${VERSION}" > version.txt
          else
            # Branch push (dev): publish a moving :dev image, no release.
            echo "version=dev" >> $GITHUB_OUTPUT
            echo "tag=dev"     >> $GITHUB_OUTPUT
            echo "dev" > version.txt
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    # Only tag pushes produce a GitHub Release; dev pushes only refresh the image.
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ needs.docker.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Docker

            **Quick start:**
            ```bash
            docker run -d -p 8000:8000 \
              -v hashhive-data:/app/backend/data \
              ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.version }}
            ```

            **Docker Compose:**
            ```yaml
            services:
              hashhive:
                image: ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.version }}
                ports: ["8000:8000"]
                volumes: [hashhive-data:/app/backend/data]
                restart: unless-stopped
            volumes:
              hashhive-data:
            ```

            **Update:**
            ```bash
            docker compose pull && docker compose up -d
            ```

            Dashboard: **http://localhost:8000**

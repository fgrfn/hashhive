name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip ruff
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Compile check
        run: python -m py_compile backend/main.py backend/alerts.py backend/gen_cert.py

      - name: Import check
        run: python -c "import sys; sys.path.insert(0, 'backend'); import main; print('OK')"
        env:
          HASHHIVE_DATA_DIR: /tmp/hashhive-ci

  secret-scan:
    name: Detect secrets & API key leaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

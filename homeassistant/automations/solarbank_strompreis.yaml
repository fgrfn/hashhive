# Home Assistant Automation – Solarbank 2 E1600 Pro Benutzermodus
#
# Einheit sensor.steingasse_63_aktueller_strompreis: ct/kWh
#
# Logik:
#   Preis ≤ 0 ct  → manual    (Benutzerdefiniert – maximale Einspeisung)
#   Preis > 4 ct  → smartmeter (Eigenverbrauch)
#   0 ct … 4 ct   → Totband, kein Umschalten (Hysterese)

alias: Solarbank 2 – Negativer Strompreis Automatik
description: >
  Schaltet die Solarbank 2 E1600 Pro auf Benutzerdefiniert (manual) wenn der
  Strompreis 0 ct/kWh oder negativ ist. Wechselt zurück auf Eigenverbrauch
  (smartmeter) sobald der Preis wieder über 4 ct/kWh steigt.

trigger:
  - platform: numeric_state
    entity_id: sensor.steingasse_63_aktueller_strompreis
    below: 0.001
    id: preis_null_oder_negativ

  - platform: numeric_state
    entity_id: sensor.steingasse_63_aktueller_strompreis
    above: 4
    id: preis_ueber_4ct

  # Beim HA-Start einmalig den aktuellen Preis prüfen
  - platform: homeassistant
    event: start
    id: ha_start

condition: []

action:
  - choose:
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: preis_null_oder_negativ
              - condition: and
                conditions:
                  - condition: trigger
                    id: ha_start
                  - condition: numeric_state
                    entity_id: sensor.steingasse_63_aktueller_strompreis
                    below: 0.001
        sequence:
          - action: select.select_option
            target:
              entity_id: select.solarbank_2_e1600_pro_benutzermodus
            data:
              option: manual

      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: preis_ueber_4ct
              - condition: and
                conditions:
                  - condition: trigger
                    id: ha_start
                  - condition: numeric_state
                    entity_id: sensor.steingasse_63_aktueller_strompreis
                    above: 4
        sequence:
          - action: select.select_option
            target:
              entity_id: select.solarbank_2_e1600_pro_benutzermodus
            data:
              option: smartmeter

mode: single

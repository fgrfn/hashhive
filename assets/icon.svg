<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#c2410c"/>
      <stop offset="55%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <clipPath id="bodyClip">
      <ellipse cx="60" cy="70" rx="13" ry="20"/>
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <polygon points="60,5 108,32 108,88 60,115 12,88 12,32" fill="url(#hexGrad)"/>

  <!-- Wings (upper) -->
  <ellipse cx="43" cy="53" rx="13" ry="6" fill="white" fill-opacity="0.82" transform="rotate(-28,43,53)"/>
  <ellipse cx="77" cy="53" rx="13" ry="6" fill="white" fill-opacity="0.82" transform="rotate(28,77,53)"/>
  <!-- Wings (lower) -->
  <ellipse cx="46" cy="64" rx="10" ry="4.5" fill="white" fill-opacity="0.65" transform="rotate(-20,46,64)"/>
  <ellipse cx="74" cy="64" rx="10" ry="4.5" fill="white" fill-opacity="0.65" transform="rotate(20,74,64)"/>

  <!-- Bee abdomen -->
  <ellipse cx="60" cy="70" rx="13" ry="20" fill="#1a1a1a"/>
  <!-- Yellow stripes clipped to abdomen -->
  <rect x="47" y="59" width="26" height="6"   fill="#fbbf24" clip-path="url(#bodyClip)"/>
  <rect x="47" y="69" width="26" height="6"   fill="#fbbf24" clip-path="url(#bodyClip)"/>
  <rect x="47" y="79" width="26" height="5.5" fill="#fbbf24" clip-path="url(#bodyClip)"/>
  <!-- Stinger -->
  <polygon points="60,89 57,96 63,96" fill="#1a1a1a"/>

  <!-- Head -->
  <circle cx="60" cy="47" r="10" fill="#1a1a1a"/>

  <!-- Antennae -->
  <line x1="56" y1="39" x2="48" y2="27" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="47" cy="25" r="3.5" fill="#1a1a1a"/>
  <line x1="64" y1="39" x2="72" y2="27" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="73" cy="25" r="3.5" fill="#1a1a1a"/>

  <!-- Eyes -->
  <circle cx="56.5" cy="46" r="2.5" fill="white"/>
  <circle cx="63.5" cy="46" r="2.5" fill="white"/>

  <!-- # symbol on abdomen -->
  <text x="60" y="85"
    font-family="Arial Black, Impact, sans-serif"
    font-size="10" font-weight="900"
    fill="#fbbf24" text-anchor="middle"
    clip-path="url(#bodyClip)">#</text>
</svg>
